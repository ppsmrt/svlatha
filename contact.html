<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contact - SV Latha Travels</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-50">

<section class="bg-indigo-600 text-white py-20 text-center">

<h1 class="text-4xl font-bold">
Contact Us
</h1>

</section>

<section class="py-16">

<div class="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-10">

<div>

<h3 class="text-xl font-semibold mb-4">
Get In Touch
</h3>

<p class="mb-3">
<i class="fa fa-phone text-blue-600"></i> +91 XXXXX XXXXX
</p>

<p class="mb-3">
<i class="fa fa-envelope text-red-500"></i> info@svlathatravels.com
</p>

<p class="mb-3">
<i class="fa fa-location-dot text-green-600"></i> Chennai, Tamil Nadu
</p>

</div>

<div>

<form class="space-y-4">

<input type="text" placeholder="Name" class="w-full border p-3 rounded">

<input type="email" placeholder="Email" class="w-full border p-3 rounded">

<textarea placeholder="Message" class="w-full border p-3 rounded"></textarea>

<button class="bg-blue-600 text-white px-6 py-3 rounded">
Send Message
</button>

</form>

</div>

</div>

</section>

</body>
</html>
