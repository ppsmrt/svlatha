<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Ride - SV Latha Travels</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<section class="bg-blue-600 text-white py-20 text-center">

<h1 class="text-4xl font-bold">
Book Your Trip
</h1>

</section>

<section class="py-16">

<div class="max-w-3xl mx-auto bg-white shadow rounded-xl p-10">

<form class="grid gap-6">

<input type="text" placeholder="Full Name" class="border p-3 rounded">

<input type="tel" placeholder="Phone Number" class="border p-3 rounded">

<input type="text" placeholder="Pickup Location" class="border p-3 rounded">

<input type="text" placeholder="Drop Location" class="border p-3 rounded">

<input type="date" class="border p-3 rounded">

<select class="border p-3 rounded">

<option>Select Vehicle</option>
<option>Sedan</option>
<option>SUV</option>
<option>Tempo Traveller</option>

</select>

<textarea placeholder="Additional Message" class="border p-3 rounded"></textarea>

<button class="bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
Submit Booking
</button>

</form>

</div>

</section>

</body>
</html>
